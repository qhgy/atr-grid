name: Update 515880 Hybrid Dashboard

on:
  push:
    branches:
      - dev
    paths:
      - 'atr_grid/**'
      - '.github/workflows/update-515880-dashboard.yml'
  schedule:
    # 每小时一次，覆盖 A 股交易时段 09:00-15:00 BJT (01:00-07:00 UTC)
    - cron: '0 1-7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atr-grid-515880-dashboard
  cancel-in-progress: true

jobs:
  update-515880-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev source
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: dev-src
        run: uv sync

      - name: Proximity gate (5% check)
        id: gate
        if: github.event_name == 'schedule'
        working-directory: dev-src
        env:
          XUEQIUTOKEN: ${{ secrets.XUEQIUTOKEN }}
        run: |
          NEAR=$(uv run python -c "
          import sys
          from atr_grid.config import for_profile
          from atr_grid.engine import generate_plan
          cfg = for_profile('trend_hybrid')
          try:
              plan = generate_plan('SH515880', shares=2000, cfg=cfg)
          except Exception:
              print('true')  # 拿不到数据时保守放行
              sys.exit(0)
          price = plan.current_price
          targets = [t for t in [
              plan.primary_sell, plan.primary_buy,
              plan.lower_invalidation, plan.upper_breakout,
              *plan.reference_sell_ladder, *plan.reference_rebuy_ladder,
          ] if t is not None]
          near = any(abs(price - t) / price < 0.05 for t in targets)
          print('true' if near else 'false')
          ")
          echo "near=$NEAR" >> $GITHUB_OUTPUT
          echo "Proximity check: $NEAR"

      - name: Generate 515880 hybrid dashboard
        if: >-
          github.event_name != 'schedule'
          || steps.gate.outputs.near == 'true'
        working-directory: dev-src
        env:
          XUEQIUTOKEN: ${{ secrets.XUEQIUTOKEN }}
        run: |
          mkdir -p output
          uv run python -m atr_grid multi SH515880 --profile trend_hybrid

      - name: Checkout Pages source
        if: >-
          github.event_name != 'schedule'
          || steps.gate.outputs.near == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          path: pages-main

      - name: Update docs/515880
        if: >-
          github.event_name != 'schedule'
          || steps.gate.outputs.near == 'true'
        run: |
          cd pages-main
          git pull --ff-only origin main
          cd ..

          TODAY=$(TZ=Asia/Shanghai date '+%Y-%m-%d')
          mkdir -p pages-main/docs/515880/snapshots
          cp dev-src/output/atr_grid.html pages-main/docs/515880/index.html
          if [ -d dev-src/output/snapshots ]; then
            cp dev-src/output/snapshots/*.html pages-main/docs/515880/snapshots/ 2>/dev/null || true
          fi
          cp dev-src/output/atr_grid.html "pages-main/docs/515880/snapshots/${TODAY}.html"

          # 同步镜像到 /dev/515880/
          mkdir -p pages-main/docs/dev/515880/snapshots
          cp dev-src/output/atr_grid.html pages-main/docs/dev/515880/index.html
          if [ -d dev-src/output/snapshots ]; then
            cp dev-src/output/snapshots/*.html pages-main/docs/dev/515880/snapshots/ 2>/dev/null || true
          fi
          cp dev-src/output/atr_grid.html "pages-main/docs/dev/515880/snapshots/${TODAY}.html"

      - name: Commit and push 515880 dashboard
        if: >-
          github.event_name != 'schedule'
          || steps.gate.outputs.near == 'true'
        working-directory: pages-main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/515880/ docs/dev/515880/
          if git diff --staged --quiet; then
            echo "No 515880 dashboard changes."
          else
            git commit -m "chore: update 515880 hybrid dashboard $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:main
          fi
