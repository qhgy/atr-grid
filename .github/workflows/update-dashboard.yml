name: Update ATR Grid Dashboard

on:
  schedule:
    # 15:30 Beijing time (UTC+8) on weekdays → 07:30 UTC
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      symbol:
        description: 'ETF symbol (e.g. SH515880)'
        required: false
        default: 'SH515880'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Generate ATR Grid plan
        env:
          XUEQIUTOKEN: ${{ secrets.XUEQIUTOKEN }}
        run: |
          SYMBOL="${{ github.event.inputs.symbol || 'SH515880' }}"
          mkdir -p output
          uv run python -m atr_grid plan "$SYMBOL" --no-save

      - name: Update docs/index.html
        run: |
          mkdir -p docs
          cp output/atr_grid.html docs/index.html
          echo "Updated: $(date '+%Y-%m-%d %H:%M UTC')" >> docs/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || \
            git commit -m "chore: auto-update dashboard $(date '+%Y-%m-%d')" && \
            git push
