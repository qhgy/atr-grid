name: Update ATR Grid Dashboard

on:
  schedule:
    # 09:00 Beijing time (UTC+8) on weekdays → 01:00 UTC
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'ETF symbols space-separated (e.g. SH515880 SH513500)'
        required: false
        default: 'SH515880 SH513500 SZ159915'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Generate multi-ETF dashboard
        env:
          XUEQIUTOKEN: ${{ secrets.XUEQIUTOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          SYMBOLS="${{ github.event.inputs.symbols || 'SH515880 SH513500 SZ159915' }}"
          mkdir -p output
          uv run python -m atr_grid multi $SYMBOLS --notify

      - name: Update docs/ (index + snapshot)
        run: |
          mkdir -p docs/snapshots
          TODAY=$(date '+%Y-%m-%d')
          cp output/atr_grid.html docs/index.html
          # Also copy any local snapshots generated
          if [ -d output/snapshots ]; then
            cp output/snapshots/*.html docs/snapshots/ 2>/dev/null || true
          fi
          # Always save today's snapshot from the Actions run
          cp output/atr_grid.html "docs/snapshots/${TODAY}.html"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || \
            git commit -m "chore: auto-update dashboard $(date '+%Y-%m-%d')" && \
            git push
