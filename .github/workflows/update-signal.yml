name: Update Daily Signal

on:
  schedule:
    # 每个交易日 15:30 BJT (07:30 UTC)，等收盘数据稳定
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atr-grid-signal
  cancel-in-progress: true

jobs:
  update-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev source
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: dev-src
        run: uv sync

      - name: Generate daily signal
        working-directory: dev-src
        env:
          XUEQIUTOKEN: ${{ secrets.XUEQIUTOKEN }}
        run: |
          uv run python -m atr_grid signal

      - name: Checkout Pages source
        uses: actions/checkout@v4
        with:
          ref: main
          path: pages-main

      - name: Update docs/signal
        run: |
          cd pages-main
          git pull --ff-only origin main
          cd ..

          mkdir -p pages-main/docs/signal/snapshots
          cp dev-src/output/signal/index.html pages-main/docs/signal/index.html
          if [ -d dev-src/output/signal/snapshots ]; then
            cp dev-src/output/signal/snapshots/*.html pages-main/docs/signal/snapshots/ 2>/dev/null || true
          fi

      - name: Commit and push signal page
        working-directory: pages-main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signal/
          if git diff --staged --quiet; then
            echo "No signal changes."
          else
            git commit -m "chore: update daily signal $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:main
          fi
